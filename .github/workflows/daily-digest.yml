name: Daily Digest

on:
  schedule:
    # UTC 23:00 = 台北 07:00（預留約 30 分鐘，使內容於台北 07:30 前上線）
    - cron: '0 23 * * *'
  workflow_dispatch:

# 僅由排程與手動觸發；commit data 不掛 push trigger，避免重複建置
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # 產生失敗（四版面皆無內容）會以非零 exit code 結束，後續 commit/build/deploy 不執行，線上維持前一版
      - name: Generate digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: yarn generate

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "data 無變更，略過 commit"
          else
            git commit -m "chore(data): 日報 $(TZ=Asia/Taipei date +%F)"
            git push
          fi

      - name: Build (vite-ssg)
        run: yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # 若 repo 尚未啟用 Pages，讓 action 自動啟用（來源設為 GitHub Actions）
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
